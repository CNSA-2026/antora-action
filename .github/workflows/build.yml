name: CI

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    container: node:16-alpine 
    steps:

      - name: Install git and rsync 📚
        run: |
           apk update && apk add git rsync

      - uses: actions/checkout@v6.0.2

      - name: Install dependencies 
        run: npm install

      - name: Build Antora project 
        run: |
          cp -R node_modules/@antora/lunr-extension/supplemental_ui/* supplemental-ui/ 
          npx antora local-antora-playbook.yml --fetch 
      # Uploads the generated site
      - uses: actions/upload-artifact@v4
        with:
          name: docs 
          path: docs/ 

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        if: contains(github.ref,'refs/heads/main') #Solo se ejecuta si hacemos push a la rama main. Evitamos modificar la rama gh-pages al construir una pull request.
        with:
          branch: gh-pages 
          folder: docs 
          clean: true 